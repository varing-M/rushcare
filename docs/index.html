<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>러쉬케어 모바일</title>
    <link rel="stylesheet" href="./mobile.css" />
  </head>
  <body class="auth-locked">
    <section class="login-screen" id="loginScreen" aria-label="로그인">
      <form class="login-card" id="loginForm">
        <div class="login-brand">
          <img src="./아이콘.png" alt="러쉬케어" />
          <div>
            <strong>러쉬케어</strong>
            <span>모바일 현황</span>
          </div>
        </div>
        <h1>로그인</h1>
        <label>
          아이디
          <input id="loginId" autocomplete="username" required />
        </label>
        <label>
          비밀번호
          <input id="loginPassword" type="password" autocomplete="current-password" required />
        </label>
        <p class="login-message" id="loginMessage"></p>
        <button id="loginSubmit" type="submit">접속</button>
      </form>
    </section>

    <header class="app-header">
      <div class="brand">
        <img src="./아이콘.png" alt="러쉬케어" />
        <div>
          <strong>러쉬케어</strong>
          <span>모바일 현황</span>
        </div>
      </div>
      <button id="openSettings" class="icon-button" type="button" aria-label="DB 설정">설정</button>
    </header>

    <main class="app-main">
      <section class="hero">
        <div>
          <p id="todayLabel">-</p>
          <h1>러쉬케어 현황판</h1>
        </div>
        <div class="hero-actions">
          <button id="openJobDialog" class="secondary" type="button">새 작업</button>
          <button id="reloadBtn" type="button">DB 불러오기</button>
        </div>
      </section>

      <section class="metrics" aria-label="요약">
        <article>
          <span>오늘 일정</span>
          <strong id="metricToday">0</strong>
        </article>
        <article>
          <span>진행중</span>
          <strong id="metricActive">0</strong>
        </article>
        <article>
          <span>이번달 매출</span>
          <strong id="metricRevenue">0원</strong>
        </article>
        <article class="danger">
          <span>미수금</span>
          <strong id="metricUnpaid">0원</strong>
        </article>
      </section>

      <nav class="tabs" aria-label="화면 선택">
        <button class="active" type="button" data-tab="today">오늘</button>
        <button type="button" data-tab="jobs">작업</button>
        <button type="button" data-tab="customers">고객</button>
        <button type="button" data-tab="payments">수금</button>
        <button type="button" data-tab="techs">기사</button>
      </nav>

      <section class="search-panel">
        <input id="searchInput" type="search" placeholder="고객명, 연락처, 주소, 작업내용 검색" />
      </section>

      <section class="tab-panel active" id="todayPanel">
        <div class="section-head">
          <h2>오늘 일정</h2>
          <span id="todayCount">0건</span>
        </div>
        <div class="card-list" id="todayList"></div>
      </section>

      <section class="tab-panel" id="jobsPanel">
        <div class="section-head">
          <h2>작업 목록</h2>
          <span id="jobsCount">0건</span>
        </div>
        <div class="card-list" id="jobsList"></div>
      </section>

      <section class="tab-panel" id="customersPanel">
        <div class="section-head">
          <h2>고객 관리</h2>
          <span id="customersCount">0명</span>
        </div>
        <div class="card-list" id="customersList"></div>
      </section>

      <section class="tab-panel" id="paymentsPanel">
        <div class="section-head">
          <h2>수금 관리</h2>
          <span id="paymentsCount">0건</span>
        </div>
        <div class="card-list" id="paymentsList"></div>
      </section>

      <section class="tab-panel" id="techsPanel">
        <div class="section-head">
          <h2>기사 관리</h2>
          <span id="techsCount">0명</span>
        </div>
        <div class="card-list" id="techsList"></div>
      </section>
    </main>

    <dialog id="settingsDialog">
      <form method="dialog" class="dialog-card">
        <div class="section-head">
          <h2>DB 설정</h2>
          <button value="close" type="submit" aria-label="닫기">닫기</button>
        </div>
        <label>
          Apps Script 웹앱 URL
          <textarea id="scriptUrlInput" rows="4" placeholder="https://script.google.com/macros/s/.../exec"></textarea>
        </label>
        <p class="hint">PC 프로그램의 DB 설정에 넣은 URL과 같은 주소를 입력합니다.</p>
        <button id="saveSettings" value="close" type="submit">저장</button>
      </form>
    </dialog>

    <dialog id="jobDialog">
      <form id="jobForm" class="dialog-card">
        <div class="section-head">
          <h2>새 작업 등록</h2>
          <button id="closeJobDialog" type="button" aria-label="닫기">닫기</button>
        </div>
        <div class="form-grid">
          <label>
            방문일
            <input id="jobDate" name="date" type="date" required />
          </label>
          <label>
            시간
            <input id="jobTime" name="time" type="time" />
          </label>
          <label>
            고객명
            <input id="jobCustomer" name="customer" type="text" autocomplete="name" required />
          </label>
          <label>
            연락처
            <input id="jobPhone" name="phone" type="tel" autocomplete="tel" />
          </label>
          <label class="full">
            주소
            <input id="jobAddress" name="address" type="text" autocomplete="street-address" />
          </label>
          <label>
            작업내용
            <input id="jobType" name="type" type="text" placeholder="예: 고압세척" required />
          </label>
          <label>
            담당기사
            <input id="jobTech" name="tech" type="text" list="techOptions" />
          </label>
          <label>
            청구금액
            <input id="jobAmount" name="amount" type="number" min="0" step="1000" inputmode="numeric" />
          </label>
          <label>
            결제수단
            <select id="jobPaymentMethod" name="paymentMethod">
              <option value="계좌이체">계좌이체</option>
              <option value="카드">카드</option>
              <option value="현금">현금</option>
              <option value="미정">미정</option>
            </select>
          </label>
          <label>
            증빙
            <select id="jobTaxDocType" name="taxDocType">
              <option value="간이영수증">간이영수증</option>
              <option value="세금계산서">세금계산서</option>
              <option value="현금영수증">현금영수증</option>
              <option value="없음">없음</option>
            </select>
          </label>
          <label>
            상태
            <select id="jobStatus" name="status">
              <option value="접수">접수</option>
              <option value="출동">출동</option>
              <option value="작업중">작업중</option>
              <option value="완료">완료</option>
              <option value="미수금">미수금</option>
            </select>
          </label>
          <label class="full">
            메모
            <textarea id="jobMemo" name="memo" rows="3"></textarea>
          </label>
        </div>
        <datalist id="techOptions"></datalist>
        <button id="saveJob" type="submit">등록</button>
      </form>
    </dialog>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <script src="./mobile.js"></script>
  </body>
</html>

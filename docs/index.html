<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#092820" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="러쉬케어" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <title>러쉬케어 모바일</title>
    <link rel="manifest" href="./manifest.webmanifest?v=20260708-5" />
    <link rel="apple-touch-icon" href="./app-icon.png" />
    <link rel="icon" href="./app-icon.png" />
    <link rel="stylesheet" href="./mobile.css?v=20260708-12" />
    <style>
      body.auth-locked .app-header,
      body.auth-locked .app-main {
        display: none;
      }

      .login-screen[hidden] {
        display: none !important;
      }

      .login-screen {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 22px;
      }

      .login-card {
        width: min(430px, 100%);
      }

      .login-brand {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .login-brand img {
        width: 46px;
        height: 46px;
        border-radius: 8px;
        object-fit: cover;
      }
    </style>
  </head>
  <body class="auth-locked">
    <section class="login-screen" id="loginScreen" aria-label="로그인">
      <form class="login-card" id="loginForm">
        <div class="login-brand">
          <img src="./아이콘.png" alt="러쉬케어" />
          <div>
            <strong>러쉬케어</strong>
            <span>모바일 현황</span>
          </div>
        </div>
        <h1>로그인</h1>
        <label>
          아이디
          <input id="loginId" autocomplete="username" required />
        </label>
        <label>
          비밀번호
          <input id="loginPassword" type="password" autocomplete="current-password" required />
        </label>
        <p class="login-message" id="loginMessage"></p>
        <button id="loginSubmit" type="submit">접속</button>
      </form>
    </section>

    <header class="app-header">
      <div class="brand">
        <img src="./아이콘.png" alt="러쉬케어" />
        <div>
          <strong>러쉬케어</strong>
          <span>모바일 현황</span>
        </div>
      </div>
      <button id="openSettings" class="icon-button" type="button" aria-label="DB 설정">설정</button>
    </header>

    <main class="app-main">
      <section class="hero">
        <div>
          <p id="todayLabel">-</p>
          <h1>러쉬케어 현황판</h1>
        </div>
        <div class="hero-actions">
          <button id="openJobDialog" class="secondary" type="button">새 작업</button>
          <button id="reloadBtn" type="button">DB 불러오기</button>
        </div>
      </section>

      <section class="metrics" aria-label="요약">
        <article>
          <span>오늘 일정</span>
          <strong id="metricToday">0</strong>
        </article>
        <article>
          <span>진행중</span>
          <strong id="metricActive">0</strong>
        </article>
        <article>
          <span>외주 수수료 제외한 이번달 매출</span>
          <strong id="metricRevenue">0원</strong>
        </article>
        <article>
          <span>지급한 외주 수수료</span>
          <strong id="metricOutsourceFee">0원</strong>
        </article>
        <article class="danger">
          <span>미수금</span>
          <strong id="metricUnpaid">0원</strong>
        </article>
      </section>

      <nav class="tabs" aria-label="화면 선택">
        <button class="active" type="button" data-tab="today">오늘</button>
        <button type="button" data-tab="jobs">작업</button>
        <button type="button" data-tab="customers">고객</button>
        <button type="button" data-tab="payments">수금</button>
        <button type="button" data-tab="techs">기사</button>
        <button type="button" data-tab="vendors">업체</button>
      </nav>

      <section class="search-panel">
        <input id="searchInput" type="search" placeholder="고객명, 연락처, 주소, 작업내용 검색" />
      </section>

      <section class="tab-panel active" id="todayPanel">
        <div class="section-head">
          <h2>오늘 일정</h2>
          <span id="todayCount">0건</span>
        </div>
        <div class="card-list" id="todayList"></div>
      </section>

      <section class="tab-panel" id="jobsPanel">
        <div class="section-head">
          <h2>작업 목록</h2>
          <span id="jobsCount">0건</span>
        </div>
        <div class="card-list" id="jobsList"></div>
      </section>

      <section class="tab-panel" id="customersPanel">
        <div class="section-head">
          <h2>고객 관리</h2>
          <div><span id="customersCount">0명</span><button class="mini-add" type="button" data-new="customer">추가</button></div>
        </div>
        <div class="card-list" id="customersList"></div>
      </section>

      <section class="tab-panel" id="paymentsPanel">
        <div class="section-head">
          <h2>수금 관리</h2>
          <span id="paymentsCount">0건</span>
        </div>
        <div class="card-list" id="paymentsList"></div>
      </section>

      <section class="tab-panel" id="techsPanel">
        <div class="section-head">
          <h2>기사 관리</h2>
          <div><span id="techsCount">0명</span><button class="mini-add" type="button" data-new="tech">추가</button></div>
        </div>
        <div class="card-list" id="techsList"></div>
      </section>

      <section class="tab-panel" id="vendorsPanel">
        <div class="section-head">
          <h2>업체 관리</h2>
          <div><span id="vendorsCount">0곳</span><button class="mini-add" type="button" data-new="vendor">추가</button></div>
        </div>
        <div class="card-list" id="vendorsList"></div>
      </section>
    </main>

    <dialog id="settingsDialog">
      <form method="dialog" class="dialog-card">
        <div class="section-head">
          <h2>DB 설정</h2>
          <button value="close" type="submit" aria-label="닫기">닫기</button>
        </div>
        <label>
          Apps Script 웹앱 URL
          <textarea id="scriptUrlInput" rows="4" placeholder="https://script.google.com/macros/s/.../exec"></textarea>
        </label>
        <p class="hint">PC 프로그램의 DB 설정에 넣은 URL과 같은 주소를 입력합니다.</p>
        <button id="saveSettings" value="close" type="submit">저장</button>
      </form>
    </dialog>

    <dialog id="jobDialog">
      <form id="jobForm" class="dialog-card">
        <div class="section-head">
          <h2 id="jobDialogTitle">새 작업 등록</h2>
          <button id="closeJobDialog" type="button" aria-label="닫기">닫기</button>
        </div>
        <div class="form-grid">
          <input id="jobId" name="id" type="hidden" />
          <label>
            방문일
            <input id="jobDate" name="date" type="date" required />
          </label>
          <label>
            시간
            <input id="jobTime" name="time" type="time" />
          </label>
          <label>
            고객명
            <input id="jobCustomer" name="customer" type="text" autocomplete="name" required />
          </label>
          <label>
            연락처
            <input id="jobPhone" name="phone" type="tel" autocomplete="tel" />
          </label>
          <label>
            접수번호
            <input id="jobReceiptNo" name="receiptNo" type="text" placeholder="예: 진이폰, 성필폰, 업무폰" />
          </label>
          <label class="full">
            주소
            <input id="jobAddress" name="address" type="text" autocomplete="street-address" />
          </label>
          <label>
            작업종류
            <select id="jobTypePreset">
              <option value="직접입력" class="custom-option">직접입력</option>
              <option>하수구 막힘</option>
              <option>싱크대 배관</option>
              <option>변기 막힘</option>
              <option>횡주관</option>
              <option>고압세척</option>
              <option>내시경 점검</option>
              <option>정기관리</option>
            </select>
            <input id="jobType" name="type" type="text" placeholder="작업종류 직접입력" required />
          </label>
          <label>
            담당 업체 또는 담당기사
            <input id="jobTech" name="tech" type="text" list="techOptions" placeholder="예: 뚱보, 러쉬케어, 홍길동" />
          </label>
          <label>
            청구금액
            <input id="jobAmount" name="amount" type="text" inputmode="numeric" />
          </label>
          <label>
            외주 수수료
            <input id="jobFee" name="fee" type="text" inputmode="numeric" />
          </label>
          <label>
            결제수단
            <select id="jobPaymentMethod" name="paymentMethod">
              <option value="계좌이체">계좌이체</option>
              <option value="카드">카드</option>
              <option value="현금">현금</option>
              <option value="미정">미정</option>
            </select>
          </label>
          <label>
            증빙
            <select id="jobTaxDocType" name="taxDocType">
              <option value="간이영수증">간이영수증</option>
              <option value="세금계산서">세금계산서</option>
              <option value="현금영수증">현금영수증</option>
              <option value="없음">없음</option>
            </select>
          </label>
          <label>
            상태
            <select id="jobStatus" name="status">
              <option value="접수">접수</option>
              <option value="접수취소">접수취소</option>
              <option value="작업중">작업중</option>
              <option value="예약">예약</option>
              <option value="작업완료">작업완료</option>
              <option value="작업완료(미수)">작업완료(미수)</option>
            </select>
          </label>
          <label class="check-label">
            <input id="jobPaid" name="paid" type="checkbox" /> 수금완료
          </label>
          <label class="full">
            메모
            <textarea id="jobMemo" name="memo" rows="3"></textarea>
          </label>
        </div>
        <section id="jobPhotos" class="photo-section" hidden>
          <strong>현장 사진</strong>
          <input id="jobPhotoInput" type="file" accept="image/*" capture="environment" multiple />
          <div id="jobPhotoList" class="photo-list"></div>
        </section>
        <datalist id="techOptions"></datalist>
        <div class="dialog-actions"><button id="deleteJob" class="danger-button" type="button" hidden>삭제</button><button id="saveJob" type="submit">저장</button></div>
      </form>
    </dialog>

    <dialog id="customerDialog">
      <form id="customerForm" class="dialog-card entity-form">
        <div class="section-head"><h2 id="customerDialogTitle">고객 등록</h2><button type="button" data-close-dialog="customerDialog">닫기</button></div>
        <input id="customerId" name="id" type="hidden" />
        <label>고객명<input name="name" required /></label>
        <label>연락처<input name="phone" type="tel" /></label>
        <label>주소<input name="address" /></label>
        <label>건물유형<input name="building" /></label>
        <label>관리주기<input name="cycle" /></label>
        <label>메모<textarea name="note" rows="3"></textarea></label>
        <div class="dialog-actions"><button id="deleteCustomer" class="danger-button" type="button" hidden>삭제</button><button type="submit">저장</button></div>
      </form>
    </dialog>

    <dialog id="techDialog">
      <form id="techForm" class="dialog-card entity-form">
        <div class="section-head"><h2 id="techDialogTitle">기사 등록</h2><button type="button" data-close-dialog="techDialog">닫기</button></div>
        <input id="techId" name="id" type="hidden" />
        <label>기사명<input name="name" required /></label>
        <label>연락처<input name="phone" type="tel" /></label>
        <label>사업자등록번호<input name="businessNo" /></label>
        <label>메모<textarea name="note" rows="3"></textarea></label>
        <div class="dialog-actions"><button id="deleteTech" class="danger-button" type="button" hidden>삭제</button><button type="submit">저장</button></div>
      </form>
    </dialog>

    <dialog id="vendorDialog">
      <form id="vendorForm" class="dialog-card entity-form">
        <div class="section-head"><h2 id="vendorDialogTitle">업체 등록</h2><button type="button" data-close-dialog="vendorDialog">닫기</button></div>
        <input id="vendorId" name="id" type="hidden" />
        <label>업체명<input name="name" required /></label>
        <label>사업자등록번호<input name="businessNo" /></label>
        <label>대표자<input name="owner" /></label>
        <label>업종<input name="businessType" /></label>
        <label>전화번호<input name="phone" type="tel" /></label>
        <label>휴대폰번호<input name="mobile" type="tel" /></label>
        <label>주소<input name="address" /></label>
        <fieldset><legend>소속기사</legend><div id="vendorTechChecks" class="check-list"></div></fieldset>
        <label>메모<textarea name="note" rows="3"></textarea></label>
        <div class="dialog-actions"><button id="deleteVendor" class="danger-button" type="button" hidden>삭제</button><button type="submit">저장</button></div>
      </form>
    </dialog>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <script src="./mobile.js?v=20260708-12"></script>
  </body>
</html>
